name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v5
        with:
          path: vault

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone -b v4 https://github.com/jackyzha0/quartz.git
          cd quartz
          rm -rf .github content
          npm ci

      - name: Copy vault to Quartz content
        run: |
          cp -r vault quartz/content
          rm -rf quartz/content/.github
          rm -rf quartz/content/.git

      - name: Apply custom Quartz config
        run: |
          cp vault/.github/quartz/quartz.config.ts quartz/quartz.config.ts
          cp vault/.github/quartz/quartz.layout.ts quartz/quartz.layout.ts
          cp vault/.github/quartz/components/TBMFooter.tsx quartz/quartz/components/TBMFooter.tsx

      - name: Build Quartz
        run: |
          cd quartz
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
