name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          git clone https://github.com/jackyzha0/quartz.git quartz
          cd quartz
          rm -rf .github content
          ln -s "$GITHUB_WORKSPACE" content
          npm ci

      - name: Apply custom Quartz config
        run: |
          cp $GITHUB_WORKSPACE/.github/quartz/quartz.config.ts quartz/quartz.config.ts
          cp $GITHUB_WORKSPACE/.github/quartz/quartz.layout.ts quartz/quartz.layout.ts

      - name: Build Quartz
        run: |
          cd quartz
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
